<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1268" width="360" height="1268"><rect x="0" y="0" width="360" height="1268" fill="#ffffff"/><rect x="12.0" y="16.0" width="336.0" height="29.0" rx="10" fill="#1d4ed8" stroke="#1d4ed8" stroke-width="1.5"/><text x="180.0" y="38.0" font-family="Helvetica,Arial,sans-serif" font-size="12.5" fill="#ffffff" font-weight="bold" text-anchor="middle" >Plantarer Fersenschmerz (Arbeitsdiagnose)</text><line x1="180.0" y1="47.0" x2="180.0" y2="61.0" stroke="#94a3b8" stroke-width="2"/><polygon points="176.0,61.0 184.0,61.0 180.0,67.0" fill="#94a3b8"/><rect x="12.0" y="67.0" width="336.0" height="29.0" rx="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5"/><text x="180.0" y="89.0" font-family="Helvetica,Arial,sans-serif" font-size="12.5" fill="#1e3a8a" font-weight="bold" text-anchor="middle" >Anamnese + klinische Untersuchung</text><rect x="12" y="104.0" width="336" height="26" rx="7" fill="#0d9488"/><text x="24.0" y="122.0" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#ffffff" font-weight="bold" letter-spacing="1">WEICHTEIL</text><rect x="12.0" y="138.0" width="336.0" height="95.0" rx="9" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/><text x="24.0" y="156.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >Stechender Anlaufschmerz morgens, Druckpunkt am</text><text x="24.0" y="171.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >inneren Fersenansatz</text><text x="24.0" y="188.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#0d9488" font-style="italic" text-anchor="start">↓</text><text x="40.0" y="188.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#0d9488" font-weight="normal" text-anchor="start" font-style="italic">Test: Ultraschall: Faszie über 4 mm verdickt</text><text x="24.0" y="217.0" font-family="Helvetica,Arial,sans-serif" font-size="13.5" fill="#0f172a" font-weight="bold" text-anchor="start">Plantarfasziitis</text><rect x="12.0" y="241.0" width="336.0" height="80.0" rx="9" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/><text x="24.0" y="259.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >Plötzlicher Schmerz, Bluterguss, tastbare Delle</text><text x="24.0" y="276.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#0d9488" font-style="italic" text-anchor="start">↓</text><text x="40.0" y="276.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#0d9488" font-weight="normal" text-anchor="start" font-style="italic">Test: Ultraschall oder MRT</text><text x="24.0" y="305.0" font-family="Helvetica,Arial,sans-serif" font-size="13.5" fill="#0f172a" font-weight="bold" text-anchor="start">Plantarfaszien-Ruptur</text><rect x="12.0" y="329.0" width="336.0" height="95.0" rx="9" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/><text x="24.0" y="347.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >Diffuser Schmerz mittig unter der Ferse, dünnes</text><text x="24.0" y="362.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >Polster</text><text x="24.0" y="379.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#0d9488" font-style="italic" text-anchor="start">↓</text><text x="40.0" y="379.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#0d9488" font-weight="normal" text-anchor="start" font-style="italic">Test: Klinik und Ultraschall</text><text x="24.0" y="408.0" font-family="Helvetica,Arial,sans-serif" font-size="13.5" fill="#0f172a" font-weight="bold" text-anchor="start">Fettpolster-Atrophie</text><rect x="12" y="438.0" width="336" height="26" rx="7" fill="#b45309"/><text x="24.0" y="456.0" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#ffffff" font-weight="bold" letter-spacing="1">KNÖCHERN</text><rect x="12.0" y="472.0" width="336.0" height="110.0" rx="9" fill="#fffbeb" stroke="#b45309" stroke-width="1.5"/><text x="24.0" y="490.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >Belastungsschmerz nach Trainingssteigerung,</text><text x="24.0" y="505.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >seitliches Zusammendrücken schmerzt</text><text x="24.0" y="522.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#b45309" font-style="italic" text-anchor="start">↓</text><text x="40.0" y="522.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#b45309" font-weight="normal" text-anchor="start" font-style="italic">Test: MRT: Knochenmarködem (Röntgen oft</text><text x="40.0" y="537.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#b45309" font-weight="normal" text-anchor="start" font-style="italic">unauffällig)</text><text x="24.0" y="566.0" font-family="Helvetica,Arial,sans-serif" font-size="13.5" fill="#0f172a" font-weight="bold" text-anchor="start">Kalkaneus-Stressfraktur</text><rect x="12.0" y="590.0" width="336.0" height="95.0" rx="9" fill="#fffbeb" stroke="#b45309" stroke-width="1.5"/><text x="24.0" y="608.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >Kind oder Jugendlicher, sportlich, Schmerz an der</text><text x="24.0" y="623.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >hinteren Ferse</text><text x="24.0" y="640.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#b45309" font-style="italic" text-anchor="start">↓</text><text x="40.0" y="640.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#b45309" font-weight="normal" text-anchor="start" font-style="italic">Test: Klinik, Röntgen zum Ausschluss</text><text x="24.0" y="669.0" font-family="Helvetica,Arial,sans-serif" font-size="13.5" fill="#0f172a" font-weight="bold" text-anchor="start">Morbus Sever</text><rect x="12.0" y="693.0" width="336.0" height="80.0" rx="9" fill="#fffbeb" stroke="#b45309" stroke-width="1.5"/><text x="24.0" y="711.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >Dauerschmerz, auch nachts oder in Ruhe</text><text x="24.0" y="728.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#b45309" font-style="italic" text-anchor="start">↓</text><text x="40.0" y="728.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#b45309" font-weight="normal" text-anchor="start" font-style="italic">Test: Röntgen, bei Bedarf MRT</text><text x="24.0" y="757.0" font-family="Helvetica,Arial,sans-serif" font-size="13.5" fill="#0f172a" font-weight="bold" text-anchor="start">Knochenzyste oder Tumor (selten)</text><rect x="12" y="787.0" width="336" height="26" rx="7" fill="#7c3aed"/><text x="24.0" y="805.0" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#ffffff" font-weight="bold" letter-spacing="1">NEUROGEN</text><rect x="12.0" y="821.0" width="336.0" height="95.0" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/><text x="24.0" y="839.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >Brennen und Missempfindung an der Innenseite der</text><text x="24.0" y="854.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >Ferse</text><text x="24.0" y="871.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#7c3aed" font-style="italic" text-anchor="start">↓</text><text x="40.0" y="871.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#7c3aed" font-weight="normal" text-anchor="start" font-style="italic">Test: MRT, ggf. Nervenmessung</text><text x="24.0" y="900.0" font-family="Helvetica,Arial,sans-serif" font-size="13.5" fill="#0f172a" font-weight="bold" text-anchor="start">Baxter-Neuropathie</text><rect x="12.0" y="924.0" width="336.0" height="95.0" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/><text x="24.0" y="942.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >Kribbeln in der Fußsohle, Klopfzeichen am inneren</text><text x="24.0" y="957.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >Knöchel positiv</text><text x="24.0" y="974.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#7c3aed" font-style="italic" text-anchor="start">↓</text><text x="40.0" y="974.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#7c3aed" font-weight="normal" text-anchor="start" font-style="italic">Test: Nervenmessung (NLG), MRT</text><text x="24.0" y="1003.0" font-family="Helvetica,Arial,sans-serif" font-size="13.5" fill="#0f172a" font-weight="bold" text-anchor="start">Tarsaltunnel-Syndrom</text><rect x="12.0" y="1027.0" width="336.0" height="80.0" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/><text x="24.0" y="1045.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >Schmerz strahlt vom Rücken ins Bein aus</text><text x="24.0" y="1062.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#7c3aed" font-style="italic" text-anchor="start">↓</text><text x="40.0" y="1062.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#7c3aed" font-weight="normal" text-anchor="start" font-style="italic">Test: MRT der Lendenwirbelsäule</text><text x="24.0" y="1091.0" font-family="Helvetica,Arial,sans-serif" font-size="13.5" fill="#0f172a" font-weight="bold" text-anchor="start">S1-Reizung (Rücken)</text><rect x="12" y="1121.0" width="336" height="26" rx="7" fill="#be123c"/><text x="24.0" y="1139.0" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#ffffff" font-weight="bold" letter-spacing="1">ENTZÜNDLICH</text><rect x="12.0" y="1155.0" width="336.0" height="95.0" rx="9" fill="#fff1f2" stroke="#be123c" stroke-width="1.5"/><text x="24.0" y="1173.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >Oft beidseits, Morgensteife, jüngere Patienten,</text><text x="24.0" y="1188.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >weitere Gelenke betroffen</text><text x="24.0" y="1205.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#be123c" font-style="italic" text-anchor="start">↓</text><text x="40.0" y="1205.0" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#be123c" font-weight="normal" text-anchor="start" font-style="italic">Test: Labor: CRP, HLA-B27</text><text x="24.0" y="1234.0" font-family="Helvetica,Arial,sans-serif" font-size="13.5" fill="#0f172a" font-weight="bold" text-anchor="start">Enthesitis bei Spondyloarthritis</text></svg>