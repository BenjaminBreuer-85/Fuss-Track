<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2C4F7C">
<title>Fuß-Track · Ihr Begleiter rund um die OP</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --c-main: #2C4F7C;
    --c-main-dark: #1F3A5C;
    --c-bg: #F7F8FA;
    --c-card: #FFFFFF;
    --c-text: #1A202C;
    --c-text-muted: #4A5568;
    --c-border: rgba(0,0,0,0.10);
    --c-shadow: 0 2px 12px rgba(0,0,0,0.10);
    --c-warning-bg: #FFF6E5;
    --c-warning-border: #E65100;
    --c-success-bg: #E6F4EA;
    --c-success-border: #137333;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--c-bg); color: var(--c-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 15px; line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 720px; margin: 0 auto; padding: 16px; min-height: 100vh; }
  .app-header {
    text-align: center; padding: 16px 0 8px;
    border-bottom: 2px solid var(--c-main);
    margin-bottom: 24px;
  }
  .app-header h1 {
    margin: 0; font-size: 22px; font-weight: 800;
    color: var(--c-main); letter-spacing: -0.5px;
  }
  .app-header .subtitle {
    font-size: 12px; color: var(--c-text-muted); margin-top: 4px;
    font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;
  }
  /* Karten */
  .card {
    background: var(--c-card);
    border-left: 3px solid var(--c-main);
    border-radius: 6px;
    box-shadow: var(--c-shadow);
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .card.warning {
    background: var(--c-warning-bg); border-left-color: var(--c-warning-border);
  }
  .card.success {
    background: var(--c-success-bg); border-left-color: var(--c-success-border);
  }
  .card h2 { margin: 0 0 12px; font-size: 17px; color: var(--c-main); }
  .card h3 { margin: 0 0 8px; font-size: 14px; color: var(--c-text); font-weight: 600; }
  .card p { margin: 0 0 8px; }
  .card-label {
    font-size: 11px; font-weight: 600; color: var(--c-main);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
  }
  /* Buttons */
  .btn {
    display: inline-block; padding: 10px 18px;
    border: none; border-radius: 6px; cursor: pointer;
    font-size: 14px; font-weight: 600;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.88; }
  .btn-primary { background: var(--c-main); color: white; }
  .btn-secondary { background: white; color: var(--c-main); border: 1px solid var(--c-main); }
  .btn-small { padding: 6px 12px; font-size: 13px; }
  .btn-large { padding: 14px 24px; font-size: 16px; }
  .btn-block { display: block; width: 100%; text-align: center; }
  /* Inputs */
  input[type="date"], input[type="text"], select {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--c-border); border-radius: 6px;
    font-size: 15px; font-family: inherit;
    background: white;
  }
  input[type="date"]:focus, select:focus { outline: 2px solid var(--c-main); outline-offset: -1px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--c-text); margin-bottom: 6px; }
  /* Phasen-Timeline */
  .timeline {
    display: flex; flex-direction: column;
    position: relative;
    padding-left: 0;
  }
  .phase {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 10px 12px 10px 0;
    cursor: pointer; transition: all 0.15s;
    position: relative;
    border-radius: 6px;
  }
  .phase:hover { background: var(--c-bg); }
  .phase.selected { background: var(--c-bg); box-shadow: inset 3px 0 0 var(--c-main); }

  /* Vertikale Verbindungslinie zwischen Markern */
  .phase-marker-wrap {
    flex: 0 0 36px;
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    align-self: stretch;
  }
  /* Linie OBERHALB des Markers (verbindet zur vorigen Phase) */
  .phase-marker-wrap::before {
    content: "";
    position: absolute;
    top: 0; bottom: 50%;
    left: 50%; transform: translateX(-50%);
    width: 2px; background: var(--c-border);
  }
  /* Linie UNTERHALB des Markers (verbindet zur nächsten Phase) */
  .phase-marker-wrap::after {
    content: "";
    position: absolute;
    top: 50%; bottom: 0;
    left: 50%; transform: translateX(-50%);
    width: 2px; background: var(--c-border);
  }
  /* Erste/letzte Phase: keine Linie auf der jeweiligen Seite */
  .phase:first-child .phase-marker-wrap::before { display: none; }
  .phase:last-child .phase-marker-wrap::after { display: none; }
  /* Vergangene Phasen: Linien-Marineblau */
  .phase.past .phase-marker-wrap::before,
  .phase.past .phase-marker-wrap::after { background: var(--c-main); }
  /* Aktuelle Phase: Linie OBERHALB ist Marineblau (kommt von past), unten grau (geht zu future) */
  .phase.current .phase-marker-wrap::before { background: var(--c-main); }

  .phase-marker {
    width: 36px; height: 36px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700;
    background: white; color: var(--c-text-muted); border: 2px solid var(--c-border);
    position: relative; z-index: 1;
  }
  .phase.current .phase-marker { background: var(--c-main); color: white; border-color: var(--c-main); }
  .phase.past .phase-marker { background: var(--c-main); color: white; border-color: var(--c-main); opacity: 0.85; }
  .phase.missed .phase-marker { background: #F4B83C; color: white; border-color: #E0A422; }
  .phase.missed .phase-marker-wrap::before,
  .phase.missed .phase-marker-wrap::after { background: #F4B83C; }

  .phase-content { flex: 1; padding-top: 6px; padding-bottom: 6px; }
  .phase-title { font-weight: 700; font-size: 14px; color: var(--c-text); }
  .phase-meta { font-size: 12px; color: var(--c-text-muted); margin-top: 2px; }
  .phase-thema { font-size: 13px; color: var(--c-text); margin-top: 4px; }
  .phase.current .phase-title { color: var(--c-main); }
  .phase.past { opacity: 0.85; }
  /* Aktive-Phase-Hervorhebung */
  .current-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    background: var(--c-main); color: white; border-radius: 10px;
    padding: 2px 8px; margin-left: 6px; text-transform: uppercase; letter-spacing: 0.3px;
  }
  /* Datenschutz-Banner */
  .privacy-banner {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white; border-top: 2px solid var(--c-main);
    padding: 16px; box-shadow: 0 -4px 16px rgba(0,0,0,0.10);
    z-index: 1000;
  }
  .privacy-banner-inner { max-width: 720px; margin: 0 auto; }
  .privacy-banner p { margin: 0 0 12px; font-size: 13px; color: var(--c-text); }
  .privacy-banner-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  /* Phasen-Detail-Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(26,32,44,0.55);
    z-index: 2000;
    display: flex; align-items: flex-end; justify-content: center;
    animation: modal-fade 0.18s ease-out;
  }
  @keyframes modal-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modal-slide { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-panel {
    background: white;
    width: 100%; max-width: 720px;
    max-height: 92vh;
    border-radius: 12px 12px 0 0;
    display: flex; flex-direction: column;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.20);
    animation: modal-slide 0.22s ease-out;
  }
  @media (min-width: 720px) {
    .modal-backdrop { align-items: center; }
    .modal-panel { border-radius: 12px; max-height: 88vh; }
  }
  .modal-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--c-border);
    flex-shrink: 0;
  }
  .modal-header-text { flex: 1; min-width: 0; }
  .modal-header-label {
    font-size: 11px; font-weight: 600; color: var(--c-text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .modal-header-title {
    font-weight: 700; font-size: 16px; color: var(--c-text);
    margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .modal-close {
    flex: 0 0 36px; width: 36px; height: 36px;
    border-radius: 50%; border: none; background: var(--c-bg);
    cursor: pointer; font-size: 18px; color: var(--c-text);
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--c-border); }
  .modal-body {
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 16px 20px 24px;
    flex: 1;
  }
  .modal-footer {
    display: flex; gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--c-border);
    background: var(--c-bg);
    flex-shrink: 0;
  }
  .modal-nav-btn {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 12px 14px;
    border: 1px solid var(--c-border); border-radius: 8px;
    background: white; cursor: pointer;
    font-weight: 600; font-size: 14px; color: var(--c-text);
    transition: all 0.12s;
  }
  .modal-nav-btn:hover:not(:disabled) { background: var(--c-bg); border-color: var(--c-main); color: var(--c-main); }
  .modal-nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .modal-nav-btn-label {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 140px;
    font-weight: 400; font-size: 12px; color: var(--c-text-muted);
  }
  .modal-nav-counter {
    flex: 0 0 auto;
    align-self: center;
    font-size: 12px; color: var(--c-text-muted);
    padding: 0 8px;
    font-weight: 600;
  }
  /* Vorauswahl-Hinweis */
  .preselect-hint {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--c-main); font-weight: 600;
    background: rgba(44,79,124,0.08); padding: 4px 10px;
    border-radius: 12px; margin-top: 4px;
  }
  /* Branding-Box */
  .branding {
    max-width: 480px; margin: 24px auto 8px; padding: 14px 16px;
    background: white; border-left: 3px solid var(--c-main);
    border-radius: 6px; box-shadow: var(--c-shadow);
    text-align: left; font-size: 12.5px; line-height: 1.5; color: var(--c-text);
  }
  .branding-label {
    font-size: 10px; font-weight: 600; color: var(--c-main);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .branding-name { font-weight: 700; }
  .branding-klinik {
    color: var(--c-text); font-size: 12px;
    margin-top: 4px; padding-top: 4px;
    border-top: 1px solid var(--c-border);
  }
  /* Cover-Block */
  .cover {
    text-align: center; padding: 40px 20px 20px;
  }
  .cover-icon {
    width: 64px; height: 64px; margin: 0 auto 16px;
    color: var(--c-main);
  }
  .cover h1 {
    margin: 0 0 12px; font-size: 26px; color: var(--c-main); letter-spacing: -0.5px;
  }
  .cover .lead {
    font-size: 14px; color: var(--c-text-muted); max-width: 480px; margin: 0 auto 20px;
  }
  /* Error-Page (kein URL-Parameter) */
  .error-page {
    text-align: center; padding: 48px 24px;
  }
  .error-page .icon {
    width: 64px; height: 64px; margin: 0 auto 20px;
    color: var(--c-warning-border);
  }
  .error-page h2 { color: var(--c-main); margin: 0 0 12px; }
  .error-page p { color: var(--c-text-muted); max-width: 420px; margin: 0 auto 16px; }
  /* Progress-Indikator */
  .progress-pill {
    display: inline-block; font-size: 11px; font-weight: 600;
    background: rgba(44,79,124,0.10); color: var(--c-main);
    padding: 4px 10px; border-radius: 12px;
  }
  /* Step-Indikator im Onboarding */
  .stepper { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; }
  .stepper-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--c-border);
  }
  .stepper-dot.active { background: var(--c-main); }
  .stepper-dot.done { background: var(--c-main); opacity: 0.5; }
  /* Footer */
  .footer-links {
    text-align: center; margin: 32px 0 16px;
    font-size: 11px; color: var(--c-text-muted);
  }
  .footer-links a {
    color: var(--c-text-muted); text-decoration: underline; margin: 0 6px;
  }
  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center; padding: 16px;
    z-index: 999;
  }
  .modal {
    background: white; border-radius: 8px; padding: 24px;
    max-width: 480px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.20);
  }
  .modal h3 { margin: 0 0 12px; color: var(--c-main); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
"use strict";

/* ============================================================
 * EINGRIFFE-KATALOG (skalierbar — neue Eingriffe einfach hinzufügen)
 * ============================================================ */
const EINGRIFFE = {
  chevron: {
    label: "Chevron/Akin-Osteotomie",
    kurzlabel: "Chevron/Akin",
    varianten: {
      einfach: {
        anzeigename: "Chevron/Akin-Osteotomie",
        beschreibung: "Chevron/Akin-Osteotomie"
      },
      komplex: {
        anzeigename: "Chevron/Akin-Osteotomie mit Zusatzeingriff",
        beschreibung: "Chevron/Akin-Osteotomie mit Zusatzeingriff an Metatarsale oder Zehen"
      }
    }
  },
  osg_arthrodese: {
    label: "OSG-Arthrodese",
    kurzlabel: "OSG-Arthrodese",
    varianten: {
      einfach: {
        anzeigename: "OSG-Arthrodese — Teilbelastung",
        beschreibung: "OSG-Arthrodese mit Teilbelastung in der Nachbehandlung"
      },
      komplex: {
        anzeigename: "OSG-Arthrodese — Entlastung",
        beschreibung: "OSG-Arthrodese mit vollständiger Entlastung in der Nachbehandlung"
      }
    }
  },
  osg_tep: {
    label: "OSG-Prothese",
    kurzlabel: "OSG-Prothese",
    varianten: {
      einfach: {
        anzeigename: "OSG-Prothese",
        beschreibung: "OSG-Prothese"
      },
      komplex: {
        anzeigename: "OSG-Prothese mit Zusatzeingriff",
        beschreibung: "OSG-Prothese mit Stabilisierung oder weiterer knöcherner Korrektur (Osteotomie/Arthrodese)"
      }
    }
  }
  // Weitere Eingriffe hier ergänzen — Struktur bleibt gleich
};

/* ============================================================
 * PHASEN-ARCHITEKTUR (skalierbar)
 * ----------------------------------------------------------------
 * Phase-Objekt: { id, type, tagOffset, label, thema, emoji }
 *   type:
 *     "onboarding" → wird sofort gezeigt, kein Datums-Bezug (tagOffset: null)
 *     "calendar"   → tagOffset (Tage relativ zur OP) entscheidet, wann sichtbar/aktuell
 *
 * Aufbau pro Variante: ONBOARDING + SHARED_PRE_OP + POST_OP[opKey]
 *   ONBOARDING        — nur Begrüßung (sofort sichtbar)
 *   SHARED_PRE_OP     — kalenderbasiert, alle drei Eingriffe identisch
 *   POST_OP[opKey]    — eingriffsspezifisch, beide Varianten teilen sich die Liste
 *
 * Texte stehen in PHASEN_INHALTE, getrennt nach Phase-ID.
 * ============================================================ */

const ONBOARDING_PHASEN = [
  { id: "begruessung", type: "onboarding", tagOffset: null, label: "Bei Anlage", thema: "Begrüßung", emoji: "👋" }
];

const SHARED_PRE_OP_PHASEN = [
  { id: "hintergrund",            type: "calendar", tagOffset: -50, label: "ca. 50 Tage vor OP", thema: "Hintergrundinformation", emoji: "ℹ️" },
  { id: "risikoverminderung",     type: "calendar", tagOffset: -45, label: "ca. 45 Tage vor OP", thema: "Risikoverminderung", emoji: "🛡️" },
  { id: "diabetes",               type: "calendar", tagOffset: -45, label: "ca. 45 Tage vor OP", thema: "Diabetes mellitus", emoji: "🩺" },
  { id: "nikotin",                type: "calendar", tagOffset: -42, label: "ca. 42 Tage vor OP", thema: "Nikotinkonsum", emoji: "🚭" },
  { id: "ernaehrung",             type: "calendar", tagOffset: -42, label: "ca. 42 Tage vor OP", thema: "Ernährung", emoji: "🍎" },
  { id: "versorgung_sozial",      type: "calendar", tagOffset: -40, label: "ca. 40 Tage vor OP", thema: "Versorgung nach OP — Sozial", emoji: "🤝" },
  { id: "versorgung_hilfsmittel", type: "calendar", tagOffset: -40, label: "ca. 40 Tage vor OP", thema: "Versorgung nach OP — Hilfsmittel", emoji: "🦯" },
  { id: "wadendehnung",           type: "calendar", tagOffset: -36, label: "ca. 36 Tage vor OP", thema: "Wadenmuskeldehnung & Gleichgewicht", emoji: "🧘" },
  { id: "aktiv_bleiben",          type: "calendar", tagOffset: -32, label: "ca. 32 Tage vor OP", thema: "Bleiben Sie aktiv", emoji: "🚴" },
  { id: "entspannung",            type: "calendar", tagOffset: -30, label: "ca. 30 Tage vor OP", thema: "Entspannung & Achtsamkeit", emoji: "🧠" },
  { id: "medikamente_vor",        type: "calendar", tagOffset: -28, label: "ca. 28 Tage vor OP", thema: "Medikamente prüfen", emoji: "💊" },
  { id: "arbeitgeber",            type: "calendar", tagOffset: -21, label: "ca. 21 Tage vor OP", thema: "Arbeitgeber informieren", emoji: "💼" },
  { id: "termine_nach",           type: "calendar", tagOffset: -18, label: "ca. 18 Tage vor OP", thema: "Termine nach OP planen", emoji: "📅" },
  { id: "praemed_vorbereitung",   type: "calendar", tagOffset: -14, label: "ca. 14 Tage vor OP", thema: "Vorbereitung auf die Prämedikation", emoji: "📋" },
  { id: "wohnung_vorbereitung",   type: "calendar", tagOffset: -14, label: "ca. 14 Tage vor OP", thema: "Vorbereitung der Wohnung", emoji: "🏠" },
  { id: "fahrt_planung",          type: "calendar", tagOffset:  -7, label: "ca. 7 Tage vor OP",  thema: "Planung der Fahrt", emoji: "🚗" },
  { id: "praemed_termin",         type: "calendar", tagOffset:  -5, label: "ca. 5 Tage vor OP",  thema: "Prämedikationstermin", emoji: "🩻" },
  { id: "tasche_packen",          type: "calendar", tagOffset:  -4, label: "ca. 4 Tage vor OP",  thema: "Packen Sie Ihre Tasche", emoji: "🎒" },
  { id: "blutverduenner",         type: "calendar", tagOffset:  -2, label: "2 Tage vor OP",      thema: "Blutverdünner pausieren", emoji: "💉" },
  { id: "nuechternheit",          type: "calendar", tagOffset:  -2, label: "2 Tage vor OP",      thema: "Nüchternheit beachten", emoji: "🍽️" },
  { id: "schmuck",                type: "calendar", tagOffset:  -1, label: "1 Tag vor OP",       thema: "Schmuck und Piercings ablegen", emoji: "💍" },
  { id: "letzter_abend",          type: "calendar", tagOffset:  -1, label: "1 Tag vor OP",       thema: "Entspannung am Vorabend", emoji: "🌙" }
];

// Nach-OP-Phasen pro Eingriff und Variante — verschachtelt {op}.{variante}
// Wenn beide Varianten denselben Flow haben, zeigen einfach und komplex auf dieselbe Array-Referenz.
// Wenn sie sich unterscheiden (z.B. Chevron einfach vs. komplex), sind es eigene Listen.
const POST_OP_PHASEN_BY_OP = (() => {
  // Chevron — EINFACH (Basis-Flow, 13 Phasen)
  const chevronEinfach = [
    { id: "ch_op_tag",         type: "calendar", tagOffset:   0, label: "OP-Tag",            thema: "Am OP-Tag", emoji: "🏥" },
    { id: "ch_abschwellung",   type: "calendar", tagOffset:   0, label: "OP-Tag",            thema: "Abschwellung", emoji: "❄️" },
    { id: "ch_zuhause",        type: "calendar", tagOffset:   1, label: "Tag 1 nach OP",     thema: "Zu Hause ankommen", emoji: "🏡" },
    { id: "ch_mobilisierung",  type: "calendar", tagOffset:   1, label: "Tag 1 nach OP",     thema: "Mobilisierung und Thromboseschutz", emoji: "🚶" },
    { id: "ch_hygiene",        type: "calendar", tagOffset:   1, label: "Tag 1 nach OP",     thema: "Körperhygiene", emoji: "🚿" },
    { id: "ch_verband_1",      type: "calendar", tagOffset:   2, label: "Tag 2 nach OP",     thema: "Erster Verbandwechsel", emoji: "🩹" },

// Gesamtliste pro Variante: ONBOARDING + SHARED_PRE_OP + POST_OP[opKey][variantKey]
function getPhasenForVariant(opKey, variantKey) {
  const opGroup = POST_OP_PHASEN_BY_OP[opKey];
  const postPhasen = (opGroup && opGroup[variantKey]) || [];
  return ONBOARDING_PHASEN.concat(SHARED_PRE_OP_PHASEN).concat(postPhasen);
}

  // ====== CHEVRON Post-OP ======
  ch_op_tag: {
    intro: "Vor der OP sind Sie informiert worden, wie Sie sich anschließend verhalten können, um Ihre Genesung zu fördern.",
    text: "Der Fuß sollte vorerst hochgelagert werden und kann gekühlt werden. Nach dem Eingriff wird in aller Regel eine Kollegin oder ein Kollege vom OP-Team bei Ihnen vorbeikommen und Sie über den Verlauf des Eingriffes informieren. Treten Sie vorerst nicht auf den Fuß auf, bis man Ihnen nach dem Eingriff hier die Freigabe erteilt. Je nach Befund in der OP kann es durchaus mal sein, dass das Behandlungs- und Belastungskonzept individuell angepasst werden muss.\n\nDie erste Mobilisierung findet in aller Regel mit einer Pflegeperson statt, die Sie anleitet und Ihnen hilft. Sobald die Schutzreflexe komplett wieder vorhanden sind, können Sie etwas essen und trinken. Seien Sie nicht besorgt, wenn man etwas Blut durch den Verband sieht. Dies ist nicht selten. Ebenfalls ist es möglich, dass der komplette Fuß oder Teile davon sich gefühlslos oder taub anfühlen. Auch dies ist kein Grund zur Sorge, da häufig eine Betäubung am Ende der OP zur besseren Einstellung der Schmerzen gegeben wird. Fragen Sie diesbezüglich bei der nächsten Visite aber einmal nach.\n\nSchmerz und Übelkeit sind nach einem Eingriff nicht immer zu vermeiden. Die Schwestern und Pfleger haben hier Bedarfsmedikamente angeordnet, die Sie sich selbst einfordern können, sollte dies nötig sein. Fragen Sie also stets gerne aktiv nach, wenn Sie Unterstützung benötigen.",
    subthemen: []
  },
  ch_abschwellung: {
    intro: "Es kommt bei Operationen des Fußes nicht selten zu deutlichen Schwellungen.",
    text: "Dies ist in einem gewissen Rahmen nicht zu verhindern, kann aber bei ausgeprägter Form die Schmerzen und auch die Gefahr einer Wundheilungsstörung mit Infekt fördern. Eine konsequente Abschwellung ist also immer sinnvoll. Hier stellen Hochlagerung, Kühlung und Schonung die Basismaßnahmen dar. Der Fuß sollte auf einem Kissen oder einer Schiene hochgelagert werden, während Sie liegen.\n\nSitzen an der Bettkante, frühe Mobilisierung in den Stand oder den Rollstuhl mit herabhängendem Fuß fördert die Schwellung und sollte vorerst vermieden werden. Zusätzlich hilft Kühlung; hierfür können Sie Cool-Packs nutzen oder einfach eine Packung TK-Gemüse. Das Kühlelement sollte nicht direkt auf den Fuß gelegt werden, sondern in ein Handtuch eingeschlagen werden. Gerade in der Frühphase, in der eine Fußbetäubung noch wirkt oder bei vorbestehenden Nervenschäden, kann übermäßiges Kühlen auch zu Erfrierungen oder Gewebeschäden führen.\n\nAls Grundregel für das Kühlen gilt: Mindestens 15 Minuten 3× pro Tag. Bei häufigerem Kühlen sollte das Kühlelement regelmäßig entfernt werden, so dass der Fuß mindestens so lange ohne Kühlung liegt, wie er gekühlt wurde.\n\nEs bestehen medikamentöse Mittel zur Förderung der Abschwellung wie Papain oder Bromelain, deren Wirkung aber überschaubar ist und trotz deren Einnahme die Basismaßnahmen konsequent erfolgen müssen.\n\nLymphdrainage kann bei der Abschwellung zusätzlich helfen. Dies kann bei stationärer Therapie im Krankenhaus oder im häuslichen Bereich über Rezept erfolgen. Bei Entlassung kann man in der Regel ein Rezept über 6 Termine zu 30 Minuten vom Behandler im Rahmen des Entlassmanagements erhalten.",
    subthemen: []
  },
  ch_zuhause: {
    intro: "Die einfache Hallux-valgus-Korrektur mittels Chevron-Osteotomie findet häufig ambulant statt.",
    text: "Bei aufwendigerem Kombinationseingriff, beidseitiger OP oder relevanten Vorerkrankungen kann hier auch eine stationäre Überwachung nötig sein. Eine Entlassung findet dann statt, wenn Ihr Schmerzniveau erträglich ist und Sie die ersten Schritte selber bewältigt haben.\n\nBei stationärer Behandlung kann Ihnen ein Taxischein im Rahmen des Entlassmanagements ausgestellt werden. Sinnvollerweise ist es aber, wenn Sie eine Vertrauensperson abholt, die direkt mit Gepäck und der Ankunft im häuslichen Umfeld helfen kann. Sollten Sie Rezepte über Medikamente oder Thromboseschutzmittel erhalten haben, können Sie diese auf dem Heimweg direkt abholen.\n\nWichtig: Bei auffälliger Wunde, Fieber, deutlicher Schmerzzunahme, Verlust des Verbandes oder Blutung sollte immer eine außerplanmäßige umgehende ärztliche Kontrolle erfolgen. Fragen Sie hier Ihren Behandler nach der Anlaufstelle oder Kontaktdaten für den Notfall.",
    subthemen: []
  },
  ch_mobilisierung: {
    intro: "Bei der Chevron-Osteotomie oder ähnlichen Osteotomien am MT I können Sie in der Regel voll belasten.",
    text: "Dies bedeutet, dass Sie in dem Verbandschuh ohne Stützen auftreten und nach Möglichkeit normal laufen. Wenn das volle Belasten möglich ist und keine Neigung zu Thrombosen vorliegt, müssen Sie keinen Thromboseschutz spritzen. Dies sollten Sie bei Ihrem Behandler aber immer explizit nachfragen.\n\nBei beidseitiger Operation ist nicht selten, dass die Patienten einige Tage 2 Stützen benötigen und durchaus etwas weniger mobil sind. Auch wenn bei beidseitiger OP eine volle Belastung erlaubt ist und formell kein Thromboseschutz angewendet werden muss, kann hier das Spritzen für 1–2 Wochen, zumindest bis zum Erreichen einer guten Mobilität, sinnvoll sein.\n\nSollte eine Neigung zu Thrombosen bei Ihnen bekannt sein oder bereits vor der Operation eine Blutverdünnung vorgelegen haben, kann Ihr Konzept abweichen, und Sie sollten hier spezifisch Ihre Behandler fragen.\n\nWeitere nicht-medikamentöse Maßnahmen zur Abwendung von Thrombosen sind regelmäßige Bewegungs- und Anspannungsübungen der Beine im Bett.",
    subthemen: [
      { label: "Mehr Informationen zum Thromboseschutz durch Bewegung", platzhalter: true }

  },
  ch_hygiene: {
    intro: "Nach dem Eingriff kann die Körperhygiene etwas verkompliziert sein.",
    text: "Sie sollten sich im Bad auf einen Stuhl oder Hocker setzen und nicht auf dem gesunden Bein balancierend auf nassem Untergrund einen Sturz riskieren. Der Verband muss belassen werden und darf nicht nass werden.\n\nIn aller Regel kann man den Fuß im Schuh mit Verband in eine wasserdichte (Müll-)Tüte stecken und am Unterschenkel mit Klebeband verschließen. Dies wirkt etwas improvisiert, klappt aber gut und ist alltagstauglich. Der Fuß selber, auch wenn er noch etwas gefärbt ist durch das Desinfektionsmittel nach dem Eingriff, muss nicht gewaschen werden.",
    subthemen: []
  },
  ch_verband_1: {
    intro: "Wenn der Verband sich nicht früher gelockert hat oder stark durchgeblutet ist, erfolgt am 2. Tag nach der OP häufig die erste Wundkontrolle.",
    text: "Machen Sie sich ruhig ein Foto der Wunde für den späteren Vergleich und erfragen Sie beim Behandler, ob alles regelrecht aussieht.\n\nSollte hier die Schwellung noch als deutlich eingeschätzt werden, müssen Sie Ihre Belastung der letzten Tage hinterfragen und sich zurücknehmen. Eine gute Abschwellung ist von besonderer Wichtigkeit für eine gute und komplikationsfreie Wundheilung und die Abwendung von Infekten.\n\nEbenfalls wird nun in der Regel in Abhängigkeit von der Wunde der nächste Termin mit Ihnen geplant. Meistens ist dieser in ca. einer Woche.",

  ch_verband_2: {
    intro: "Beim Verbandwechsel wird die Wunde desinfiziert, Steri-Strips können belassen werden.",
    text: "Die Wunde sollte nun trocken sein, die Abschwellung bereits erkennbar. Ein neuer redressierender Verband wird angelegt mit Zentrierung der großen Zehe, damit hier die korrigierten Weichteile unterstützt ausheilen können. Eine Anleitung zur Verbandstechnik finden Sie in unserem Nachbehandlungsschema.\n\nSie können Fragen zum Verlauf stellen und eine neue AU ausgestellt bekommen. Der nächste Termin ist in der Regel in einer Woche zum Fadenzug. Sollten Sie noch Thromboseschutzspritzen nutzen, dann können Sie nun fragen, ob Sie diese noch weiter benötigen.",
    subthemen: [
      { label: "Anleitung zum Verbandwechsel", platzhalter: true }
    ]
  },
  ch_faden: {
    intro: "Das einliegende Nahtmaterial wird entfernt; bei resorbierbaren Fäden müssen nur die Knoten gekappt werden. Im gleichen Termin wird auch der dritte Verbandwechsel durchgeführt.",
    text: "Der Fadenzug sollte immer durch eine Ärztin oder einen Arzt erfolgen, die in der Behandlung von Wunden erfahren sind.\n\nEs wird ein neuer redressierender Verband angelegt und das weitere Procedere besprochen. Sollten die Zwischenzehenkeile und eine Hallux-Schiene noch nicht vorliegen, können Sie nun mit Ihrem Behandler besprechen, ob dieser Ihnen die Hilfsmittel noch verschreibt. Die Zwischenzehenkeile sind in der Regel nicht verschreibungsfähig und müssen für wenige Euro im Sanitätshaus gekauft werden.",

  ch_verband_4: {
    intro: "Beim vierten Verbandwechsel wird die Wunde erneut desinfiziert und der redressierende Verband neu angelegt.",
    text: "Aufgrund der zusätzlichen Eingriffe (z.B. an Mittelfuß oder Kleinzehen) ist eine längere Verbandstherapie notwendig, um die korrekte Positionierung weiterhin zu unterstützen. Eine Anleitung zur Verbandstechnik finden Sie unten verlinkt.\n\nDer nächste Termin ist in der Regel in einer Woche zur Abnahme des Verbandes.",
    subthemen: [
      { label: "Anleitung zum Verbandwechsel", platzhalter: true }
    ]
  },
  ch_verband_ab: {
    intro: "Es sind nun 3 Wochen seit dem Eingriff vergangen.",
    text: "Der Verband kann nun abgenommen werden; die Wunde an der Innenseite des Fußes kann aber weiter mit einem Pflaster vor Druck geschützt werden. Wenn die Abschwellung gut vorangeschritten ist, kann jetzt in das normale Schuhwerk gewechselt werden. Hier ist in aller Regel erst einmal die Nutzung von weitem oder offenem Schuhwerk nötig. Sollte der Fuß noch zu geschwollen sein, kann auch der Verbandschuh vorerst weiter getragen werden. Dies wäre nicht ungewöhnlich.\n\nNach Abnahme des Verbandes muss die Großzehe weiterhin positioniert werden. Dafür nutzen Sie die Zwischenzehenkeile tagsüber und die Hallux-Schiene zur Nacht.",
    subthemen: [
      { label: "Anleitung Nutzung Keile und Nachtschiene", platzhalter: true }
    ]
  },
  ch_verband_ab_kx: {
    intro: "Es sind nun ca. 4 Wochen seit dem Eingriff vergangen.",
    text: "Der Verband kann nun abgenommen werden; die Wunde an der Innenseite des Fußes kann aber weiter mit einem Pflaster vor Druck geschützt werden. Sollte ein Draht in eine Zehe eingesetzt worden sein, wird dieser nun entfernt, und die Kleinzehen müssen weiter mit einem Tape zentrierend positioniert werden. Dies muss zwingend von einem in Fußchirurgie erfahrenen Behandler erfolgen.\n\nWenn die Abschwellung gut vorangeschritten ist, kann jetzt in das normale Schuhwerk gewechselt werden. Hier ist in aller Regel erst einmal die Nutzung von weitem oder offenem Schuhwerk nötig. Sollte der Fuß noch zu geschwollen sein, kann auch der Verbandschuh vorerst weiter getragen werden. Dies wäre nicht ungewöhnlich.\n\nNach Abnahme des Verbandes muss die Großzehe weiterhin positioniert werden. Dafür nutzen Sie die Zwischenzehenkeile tagsüber und die Hallux-Schiene zur Nacht. Gerade bei komplexen Eingriffen an mehreren Zehen ergeben sich aber sehr individuelle Konzepte. Hier sollte genau mit den Operateuren geklärt werden, wie die Nachbehandlung und das Taping/Zentrieren der Zehen erfolgt, und keinen pauschalen Konzepten gefolgt werden.",
    subthemen: [

  ch_bewegung_kx: {
    intro: "Eine Steife des Großzehengrundgelenkes als Folge der Ruhigstellung und Vernarbungen im Körper ist kein seltenes Problem.",
    text: "Dieser Steife können Sie vorbeugen, indem Sie frühzeitig mit Bewegungsübungen des Großzehengrundgelenkes in die Beugung und Hebung beginnen. Dies können Sie vorsichtig selbst im beschwerdefreien Bereich machen. Häufig ist dies am Anfang nur in geringem Maße möglich und kann dann von Tag zu Tag gesteigert werden.\n\nEine Führung der Großzehe zur guten Ausreifung der gerafften Kapsel und verlagerten Sehne auf der Fußinnenseite ist aber weiterhin nötig mittels Zwischenzehenkeile und Schiene. Alternativ kann hier auch ein Taping genutzt werden, was aber regelmäßig gewechselt und von einem erfahrenen Behandler angelegt werden muss.",
    subthemen: []

  ch_bewegung: {

    text: "Dieser Steife können Sie vorbeugen, indem Sie frühzeitig mit Bewegungsübungen des Großzehengrundgelenkes in die Beugung und Hebung beginnen. Dies können Sie vorsichtig selbst im beschwerdefreien Bereich machen. Häufig ist dies am Anfang nur in geringem Maße möglich und kann dann von Tag zu Tag gesteigert werden.\n\nEine Führung der Großzehe zur guten Ausreifung der gerafften Kapsel und verlagerten Sehne auf der Fußinnenseite ist aber weiterhin nötig mittels Zwischenzehenkeile und Schiene. Alternativ kann hier auch ein Taping genutzt werden, was aber regelmäßig gewechselt und von einem erfahrenen Behandler angelegt werden muss.",

  ch_narbe: {
    intro: "Aktuell sollten Sie bereits schon wieder halbwegs flüssig im weiten Schuh mit Hilfe der Zwischenzehenkeile laufen.",
    text: "Wenn die Wunde nun komplett abgeheilt ist, die Kruste sich gelöst hat und kein Sekret im Pflaster ist, können Sie mit Narbenpflege beginnen. Ein Beginn ca. 6 Wochen nach dem Eingriff ist ausreichend, früher muss dies nicht sein.\n\nSie können sich hier Narbenöl oder ähnliches kaufen; in der Regel ist es aber auch effektiv, die Narbe mehrmals täglich mit Bepanthen oder Panthenol kräftig zu massieren. Die Massage löst Verklebungen und fördert die Durchblutung. Dieser mechanische Effekt ist wichtiger als die Art der verwendeten Salbe.",

  ch_sport: {
    intro: "Sie können nun mit sportlicher Betätigung beginnen.",
    text: "In aller Regel bieten sich hier vorerst Radfahren auf dem Ergometer, Wassergymnastik oder Rudern an der Maschine im weiten Schuh an. Ebenfalls können Sie Fitnessübungen am Gerät in sitzender Position machen.\n\nLauf-, Sprung-, Kampf-, Ball- oder Mannschaftssport ist meistens 6 Wochen nach dem Eingriff noch nicht umsetzbar. Ab jetzt können Sie, bei guter Mobilität im Alltag, langsam nach eigenem Bauchgefühl schrittweise die sportliche Belastung steigern. Sollten Sie im Alltag und im Rahmen des Wiederbeginns der beruflichen Betätigung aber noch Schmerz und Schwellung im relevanten Ausmaß empfinden, ist es sinnvoll, noch etwas Geduld zu haben.",
    subthemen: []
  },
  ch_kontrolle: {
    intro: "Der Eingriff ist nun 3 Monate her.",
    text: "Sie sollten im Alltag bereits gut zurechtkommen und auch darüber hinaus Ihre Belastung bereits etwas steigern können. Die Zwischenzehenkeile und die Nachtschiene müssen Sie nun nicht mehr nutzen. Das Großzehengrundgelenk sollte bereits zufriedenstellend beweglich sein, so dass Sie dieses heben und über dem mittleren Teil des Vorfußes auch abrollen können. Eine gewisse Verminderung der Beweglichkeit im Seitenvergleich wäre aber zu diesem Zeitpunkt noch häufig.\n\nSollten noch relevante Beschwerden oder eine störende Steife des Gelenkes vorliegen, ist eine ärztliche Kontrolle nötig, am besten bei den Kolleginnen, die auch den Eingriff durchgeführt haben.\n\nZur Beurteilung der Sinnhaftigkeit von neuen Einlagen kann nun eine neue Beurteilung des Gangbildes und eine Fußdruckmessung erfolgen.",

/* ============================================================
 * STORAGE LAYER — abstrahierte Schnittstelle
 * Heute: localStorage. Später: Firebase (Storage tauschen, Rest bleibt).
 * Datenstruktur ist bereits firebase-tauglich.
 * ============================================================ */
const STORAGE_KEY = "fusstrack_session";
const PRIVACY_KEY = "fusstrack_privacy_accepted";

const Storage = {
  get: function() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  },
  set: function(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); return true; }
    catch (e) { return false; }
  },
  clear: function() {
    try { localStorage.removeItem(STORAGE_KEY); return true; }
    catch (e) { return false; }
  },
  getPrivacy: function() {
    try { return localStorage.getItem(PRIVACY_KEY) === "yes"; }
    catch (e) { return false; }
  },
  setPrivacy: function() {
    try { localStorage.setItem(PRIVACY_KEY, "yes"); return true; }
    catch (e) { return false; }
  }
};

/* ============================================================
 * HELPERS
 * ============================================================ */
function generateSessionId() {
  // crypto.randomUUID() wenn verfügbar, sonst Fallback
  if (typeof crypto !== "undefined" && crypto.randomUUID) {
    return crypto.randomUUID();
  }
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0;
    return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function getUrlParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    op: params.get("op"),
    var: params.get("var")
  };
}

function isValidEingriffsAuswahl(op, vari) {
  if (!op || !EINGRIFFE[op]) return false;
  if (!vari || !EINGRIFFE[op].varianten[vari]) return false;
  return true;
}

function getPhaseKey(op, vari) {
  return op + "_" + vari;
}

function formatDateGerman(isoDate) {
  if (!isoDate) return "—";
  const parts = isoDate.split("-");
  if (parts.length !== 3) return isoDate;
  return parts[2] + "." + parts[1] + "." + parts[0];
}

function todayIso() {
  const d = new Date();
  return d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, "0") + "-" +
    String(d.getDate()).padStart(2, "0");
}

function daysBetween(isoA, isoB) {
  // isoB minus isoA in Tagen (positiv: B liegt nach A)
  const a = new Date(isoA + "T00:00:00");
  const b = new Date(isoB + "T00:00:00");
  return Math.round((b - a) / (1000 * 60 * 60 * 24));
}

function computeCurrentPhaseIndex(phasen, opDatumIso) {
  if (!opDatumIso) return -1;
  const today = todayIso();
  const diff = daysBetween(opDatumIso, today); // Tage seit OP (positiv) oder bis OP (negativ)
  // Aktuelle Phase = die mit dem höchsten "Sortier-Offset" der <= diff ist
  // Onboarding-Phasen (tagOffset null) gelten immer als "bereits durchlaufen" (offset = -Infinity)
  let idx = -1;
  for (let i = 0; i < phasen.length; i++) {
    const off = phasen[i].tagOffset === null ? -Infinity : phasen[i].tagOffset;
    if (off <= diff) idx = i;
    else break;
  }
  return idx;
}

/* ============================================================
 * REACT COMPONENTS
 * ============================================================ */
const { useState, useEffect, useMemo } = React;

function App() {
  const [privacyOk, setPrivacyOk] = useState(Storage.getPrivacy());
  const urlParams = useMemo(getUrlParams, []);
  const [session, setSession] = useState(Storage.get());
  const [showResetModal, setShowResetModal] = useState(false);

  // Zugang nur über URL-Parameter (II): wenn keine gültigen Parameter UND keine bestehende Session
  const hasValidUrlParams = isValidEingriffsAuswahl(urlParams.op, urlParams.var);
  const hasSession = session && isValidEingriffsAuswahl(session.eingriff, session.variante);

  // Wenn URL-Parameter da sind und keine Session existiert → neue Session anlegen
  useEffect(() => {
    if (!hasValidUrlParams) return;
    if (hasSession) {
      // Falls Session existiert, aber Eingriff/Variante NICHT zu URL passt → URL gewinnt (Hart-Lock)
      if (session.eingriff !== urlParams.op || session.variante !== urlParams.var) {
        // Neue Session anlegen, alte überschreiben
        const newSession = {
          sessionId: generateSessionId(),
          eingriff: urlParams.op,
          variante: urlParams.var,
          opDatum: null,
          createdAt: new Date().toISOString(),
          feedback: {},
          pushAbo: {}
        };
        Storage.set(newSession);
        setSession(newSession);
      }
      return;
    }
    // Keine Session → neu anlegen
    const newSession = {
      sessionId: generateSessionId(),
      eingriff: urlParams.op,
      variante: urlParams.var,
      opDatum: null,
      createdAt: new Date().toISOString(),
      feedback: {},
      pushAbo: {}
    };
    Storage.set(newSession);
    setSession(newSession);
  }, [hasValidUrlParams, urlParams.op, urlParams.var]);

  function updateSession(updates) {
    const next = Object.assign({}, session, updates);
    Storage.set(next);
    setSession(next);
  }

  // Tab-Titel dynamisch an den aktuellen Eingriff anpassen
  useEffect(() => {
    if (hasSession) {
      const eingriff = EINGRIFFE[session.eingriff];
      document.title = "Fuß-Track · " + (eingriff.kurzlabel || eingriff.label);
    } else {
      document.title = "Fuß-Track · Ihr Begleiter rund um die OP";
    }
  }, [hasSession, session && session.eingriff]);

  function resetSession() {
    Storage.clear();
    setSession(null);
    setShowResetModal(false);
    // Bei aktiven URL-Parametern wird Session sofort wieder angelegt durch useEffect
    if (!hasValidUrlParams) {
      // Andernfalls: Page neu laden, damit ErrorPage erscheint
      window.location.href = window.location.pathname;
    }
  }

  function acceptPrivacy() {
    Storage.setPrivacy();
    setPrivacyOk(true);
  }

  // === RENDER ===
  if (!hasValidUrlParams) {
    return <ErrorPage />;
  }

  return (
    <div className="app">
      <Header />
      {session && (
        <>
          {!session.opDatum
            ? <DatumEingabe session={session} onUpdate={updateSession} />
            : <PhasenVerlauf session={session} onUpdate={updateSession} onReset={() => setShowResetModal(true)} />
          }
        </>
      )}
      <Branding />
      <FooterLinks />
      {!privacyOk && <PrivacyBanner onAccept={acceptPrivacy} />}
      {showResetModal && (
        <ResetModal
          onConfirm={resetSession}
          onCancel={() => setShowResetModal(false)}
        />
      )}
    </div>
  );
}

function Header() {
  return (
    <div className="app-header">
      <h1>Fuß-Track</h1>
      <div className="subtitle">Ihr Begleiter rund um die Operation</div>
    </div>
  );
}

function ErrorPage() {
  return (
    <div className="app">
      <Header />
      <div className="error-page">
        <svg className="icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <rect x="14" y="20" width="36" height="28" rx="4" />
          <path d="M22 20 V14 a 6 6 0 0 1 12 0 V20" />
          <circle cx="32" cy="34" r="3" />
        </svg>
        <h2>Bitte verwenden Sie den QR-Code aus Ihrem Arztbrief</h2>
        <p>
          Fuß-Track ist Ihr persönlicher Begleiter rund um einen geplanten Eingriff am Fuß oder Sprunggelenk.
          Der Zugang erfolgt ausschließlich über den QR-Code, den Sie in Ihrem Arztbrief finden.
        </p>
        <p>
          So wird sichergestellt, dass Sie die Informationen zum richtigen Eingriff und passend zu Ihrer Behandlung erhalten.
        </p>
      </div>
      <Branding />
      <FooterLinks />
    </div>
  );

function DatumEingabe({ session, onUpdate }) {
  const eingriff = EINGRIFFE[session.eingriff];
  const variante = eingriff.varianten[session.variante];
  const [datum, setDatum] = useState("");

  function speichern() {
    if (!datum) return;
    onUpdate({ opDatum: datum });
  }

  return (
    <>
      <div className="card">
        <div className="card-label">Ihr Eingriff (vom Arzt vorausgewählt)</div>
        <h2 style={{ marginTop: 0 }}>{variante.anzeigename}</h2>
        {variante.beschreibung !== variante.anzeigename && (
          <p style={{ margin: 0, color: "var(--c-text-muted)", fontSize: 13 }}>{variante.beschreibung}</p>
        )}
        <div className="preselect-hint">🔒 Diese Auswahl wurde von Ihrem Arzt festgelegt</div>
      </div>

      <div className="card">
        <h2>Wann ist Ihr OP-Termin?</h2>
        <p style={{ marginBottom: 12 }}>
          Bitte geben Sie das geplante Datum Ihrer Operation ein. Sie können das Datum jederzeit anpassen, falls sich der Termin verschiebt.
        </p>
        <label htmlFor="op-datum">OP-Datum</label>
        <input
          id="op-datum"
          type="date"
          value={datum}
          onChange={(e) => setDatum(e.target.value)}
          min={todayIso()}
        />
        <button
          className="btn btn-primary btn-block btn-large"
          style={{ marginTop: 16 }}
          disabled={!datum}
          onClick={speichern}
        >
          Weiter
        </button>
      </div>
    </>
  );
}

function PhasenVerlauf({ session, onUpdate, onReset }) {
  const eingriff = EINGRIFFE[session.eingriff];
  const variante = eingriff.varianten[session.variante];
  const phasen = useMemo(
    () => getPhasenForVariant(session.eingriff, session.variante),
    [session.eingriff, session.variante]
  );
  const currentIdx = useMemo(
    () => computeCurrentPhaseIndex(phasen, session.opDatum),
    [phasen, session.opDatum]
  );

  // Verpasste kalenderbasierte Phasen: tagOffset < heute relativ zur OP, aber NICHT current
  const missedPhases = useMemo(() => {
    if (!session.opDatum) return [];
    const today = todayIso();
    const diff = daysBetween(session.opDatum, today); // positiv: nach OP, negativ: vor OP
    return phasen
      .map((p, idx) => ({ p, idx }))
      .filter(({ p }) => p.type === "calendar" && p.tagOffset !== null && p.tagOffset < diff && p.tagOffset < 0);
  }, [phasen, session.opDatum]);

  const [selectedPhaseIdx, setSelectedPhaseIdx] = useState(null);
  const [editingDate, setEditingDate] = useState(false);
  const [tempDate, setTempDate] = useState(session.opDatum);

  // ESC schließt Modal, Body-Scroll-Lock wenn offen
  useEffect(() => {
    if (selectedPhaseIdx === null) {
      document.body.style.overflow = "";
      return;
    }
    document.body.style.overflow = "hidden";
    const onKey = (e) => {
      if (e.key === "Escape") setSelectedPhaseIdx(null);
      else if (e.key === "ArrowRight" && selectedPhaseIdx < phasen.length - 1) setSelectedPhaseIdx(selectedPhaseIdx + 1);
      else if (e.key === "ArrowLeft" && selectedPhaseIdx > 0) setSelectedPhaseIdx(selectedPhaseIdx - 1);
    };
    window.addEventListener("keydown", onKey);
    return () => {
      window.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, [selectedPhaseIdx, phasen.length]);

  function saveDate() {
    if (!tempDate) return;
    onUpdate({ opDatum: tempDate });
    setEditingDate(false);
  }

  return (
    <>
      {/* Übersicht */}
      <div className="card">
        <div className="card-label">Ihre Auswahl</div>
        <h2 style={{ marginTop: 0 }}>{variante.anzeigename}</h2>
        {variante.beschreibung !== variante.anzeigename && (
          <p style={{ margin: "0 0 8px", color: "var(--c-text-muted)", fontSize: 13 }}>{variante.beschreibung}</p>
        )}

        {!editingDate ? (
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <span style={{ fontSize: 13, color: "var(--c-text-muted)" }}>
              OP-Termin: <strong style={{ color: "var(--c-text)" }}>{formatDateGerman(session.opDatum)}</strong>
            </span>
            <button className="btn btn-secondary btn-small" onClick={() => { setTempDate(session.opDatum); setEditingDate(true); }}>
              Datum ändern
            </button>
          </div>
        ) : (
          <div>
            <label htmlFor="edit-datum">OP-Datum</label>
            <input
              id="edit-datum"
              type="date"
              value={tempDate || ""}
              onChange={(e) => setTempDate(e.target.value)}
            />
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <button className="btn btn-primary btn-small" onClick={saveDate}>Speichern</button>
              <button className="btn btn-secondary btn-small" onClick={() => setEditingDate(false)}>Abbrechen</button>
            </div>
          </div>
        )}

        <div style={{ marginTop: 12, fontSize: 12, color: "var(--c-text-muted)" }}>
          {currentIdx >= 0 ? (
            <span className="progress-pill">
              Aktuelle Phase: {phasen[currentIdx].label}
            </span>
          ) : (
            <span className="progress-pill">Verlauf beginnt vor OP</span>
          )}
        </div>
      </div>

      {/* Verpasste Phasen — Hinweis-Karte */}
      {missedPhases.length > 0 && (
        <div className="card warning">
          <h2 style={{ marginTop: 0 }}>⚠ Wichtige Themen nachholen</h2>
          <p style={{ marginBottom: 8 }}>
            Da Sie näher am OP-Termin sind als für den vollständigen Verlauf vorgesehen, sollten Sie folgende Themen jetzt prioritär nachholen:
          </p>
          <ul style={{ margin: 0, paddingLeft: 18 }}>
            {missedPhases.map(({ p, idx }) => (
              <li key={p.id} style={{ marginBottom: 4 }}>
                <a href="#" onClick={(e) => { e.preventDefault(); setSelectedPhaseIdx(idx); }}
                   style={{ color: "var(--c-warning-border)", fontWeight: 600, textDecoration: "underline" }}>
                  {p.thema} ({p.label})
                </a>
              </li>
            ))}
          </ul>
        </div>
      )}

      {/* Timeline */}
      <div className="card">
        <h2>Ihr Verlauf</h2>
        <p style={{ fontSize: 13, color: "var(--c-text-muted)", marginBottom: 16 }}>
          Tippen Sie auf eine Phase, um die Inhalte zu öffnen.
        </p>
        <div className="timeline">
          {phasen.map((phase, idx) => {
            let cls = "phase";
            const isMissed = missedPhases.some(m => m.idx === idx);
            if (isMissed) cls += " missed";
            else if (idx === currentIdx) cls += " current";
            else if (idx < currentIdx) cls += " past";
            if (idx === selectedPhaseIdx) cls += " selected";
            const markerContent = phase.emoji || (idx + 1);
            return (
              <div key={phase.id} className={cls} onClick={() => setSelectedPhaseIdx(idx)}>
                <div className="phase-marker-wrap">
                  <div className="phase-marker">{markerContent}</div>
                </div>
                <div className="phase-content">
                  <div className="phase-title">
                    {phase.thema}
                    {idx === currentIdx && !isMissed && <span className="current-badge">Aktuell</span>}
                    {isMissed && <span className="current-badge" style={{ background: "#E0A422" }}>📌 Nachholen</span>}
                  </div>
                  <div className="phase-meta">{phase.label}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Phasen-Detail-Modal (Overlay) */}
      {selectedPhaseIdx !== null && phasen[selectedPhaseIdx] && (
        <PhasenDetailModal
          phase={phasen[selectedPhaseIdx]}
          inhalt={PHASEN_INHALTE[phasen[selectedPhaseIdx].id]}
          index={selectedPhaseIdx}
          total={phasen.length}
          prevPhase={selectedPhaseIdx > 0 ? phasen[selectedPhaseIdx - 1] : null}
          nextPhase={selectedPhaseIdx < phasen.length - 1 ? phasen[selectedPhaseIdx + 1] : null}
          onClose={() => setSelectedPhaseIdx(null)}
          onPrev={() => setSelectedPhaseIdx(selectedPhaseIdx - 1)}
          onNext={() => setSelectedPhaseIdx(selectedPhaseIdx + 1)}
        />
      )}

      {/* Reset-Button */}
      <div style={{ textAlign: "center", marginTop: 24 }}>
        <button className="btn btn-secondary btn-small" onClick={onReset}>
          Verlauf zurücksetzen
        </button>
      </div>
    </>
  );
}

function PhasenDetailModal({ phase, inhalt, index, total, prevPhase, nextPhase, onClose, onPrev, onNext }) {
  // Klick auf Backdrop (nicht Panel) schließt
  function onBackdropClick(e) {
    if (e.target === e.currentTarget) onClose();
  }
  return (
    <div className="modal-backdrop" onClick={onBackdropClick} role="dialog" aria-modal="true">
      <div className="modal-panel">
        <div className="modal-header">
          <div className="modal-header-text">
            <div className="modal-header-label">Phase {index + 1} von {total} · {phase.label}</div>
            <div className="modal-header-title">
              {phase.emoji && <span style={{ marginRight: 6 }}>{phase.emoji}</span>}
              {phase.thema}
            </div>
          </div>
          <button className="modal-close" onClick={onClose} aria-label="Schließen">×</button>
        </div>

        <div className="modal-body">
          {inhalt ? (
            <>
              {inhalt.intro && (
                <p style={{ fontSize: 15, fontWeight: 500, color: "var(--c-text)", marginTop: 0 }}>
                  {inhalt.intro}
                </p>
              )}
              {inhalt.text && inhalt.text.split("\n\n").map((para, i) => (
                <p key={i} style={{ marginTop: 12, color: "var(--c-text)" }}>{para}</p>
              ))}
              {inhalt.subthemen && inhalt.subthemen.length > 0 && (
                <div style={{ marginTop: 20, paddingTop: 16, borderTop: "1px solid var(--c-border)" }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "var(--c-text-muted)", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>
                    Weiterführende Informationen
                  </div>
                  {inhalt.subthemen.map((sub, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0", borderBottom: i < inhalt.subthemen.length - 1 ? "1px solid var(--c-border)" : "none" }}>
                      <span style={{ fontSize: 14, color: "var(--c-text-muted)" }}>📖</span>
                      <span style={{ fontSize: 13, color: "var(--c-text)" }}>{sub.label}</span>
                      {sub.platzhalter && (
                        <span style={{ fontSize: 10, padding: "2px 6px", background: "var(--c-bg)", borderRadius: 8, color: "var(--c-text-muted)", marginLeft: "auto" }}>
                          bald verfügbar
                        </span>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </>
          ) : (
            <p style={{ marginTop: 0, padding: 16, background: "var(--c-bg)", borderRadius: 6, fontSize: 13, color: "var(--c-text-muted)" }}>
              <em>Die Inhalte zu dieser Phase werden derzeit vorbereitet und in den nächsten Tagen ergänzt.</em>
            </p>
          )}
        </div>

        <div className="modal-footer">
          <button className="modal-nav-btn" onClick={onPrev} disabled={!prevPhase} aria-label="Vorherige Phase">
            <span>←</span>
            <span className="modal-nav-btn-label">{prevPhase ? prevPhase.thema : "Anfang"}</span>
          </button>
          <div className="modal-nav-counter">{index + 1} / {total}</div>
          <button className="modal-nav-btn" onClick={onNext} disabled={!nextPhase} aria-label="Nächste Phase">
            <span className="modal-nav-btn-label">{nextPhase ? nextPhase.thema : "Ende"}</span>
            <span>→</span>
          </button>
        </div>
      </div>
    </div>
  );
}

function Branding() {
  return (
    <div className="branding">
      <div className="branding-label">Inhalt und Bewertung</div>
      <div><span className="branding-name">Dr. med. Benjamin Breuer D.O. DAAO</span></div>
      <div>Spezialist für Fuß- und Sprunggelenkchirurgie</div>
      <div className="branding-klinik">Florence Nightingale Krankenhaus, Düsseldorf Kaiserswerth</div>
    </div>
  );
}

function FooterLinks() {
  return (
    <div className="footer-links">
      <a href="#datenschutz" onClick={(e) => { e.preventDefault(); alert("Datenschutzerklärung folgt"); }}>Datenschutz</a>
      ·
      <a href="#impressum" onClick={(e) => { e.preventDefault(); alert("Impressum folgt"); }}>Impressum</a>
    </div>
  );
}

function PrivacyBanner({ onAccept }) {
  return (
    <div className="privacy-banner">
      <div className="privacy-banner-inner">
        <p>
          <strong>Hinweis zur Datenverarbeitung:</strong> Diese Seite speichert Ihre Auswahl
          (Eingriff, Variante, OP-Datum) lokal in Ihrem Browser. Es werden keine personenbezogenen
          Daten an einen Server übertragen. Mit „Einverstanden" bestätigen Sie die Verwendung
          dieser lokalen Speicherung.
        </p>
        <div className="privacy-banner-actions">
          <button className="btn btn-primary btn-small" onClick={onAccept}>Einverstanden</button>
          <a href="#datenschutz" onClick={(e) => { e.preventDefault(); alert("Datenschutzerklärung folgt"); }}
             className="btn btn-secondary btn-small" style={{ textDecoration: "none" }}>
            Mehr erfahren
          </a>
        </div>
      </div>
    </div>
  );
}

function ResetModal({ onConfirm, onCancel }) {
  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h3>Verlauf zurücksetzen?</h3>
        <p>
          Ihre Auswahl und das Datum werden gelöscht. Sie kehren zur Datumseingabe zurück.
          Diese Aktion kann nicht rückgängig gemacht werden.
        </p>
        <div className="modal-actions">
          <button className="btn btn-secondary btn-small" onClick={onCancel}>Abbrechen</button>
          <button className="btn btn-primary btn-small" onClick={onConfirm}>Ja, zurücksetzen</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
